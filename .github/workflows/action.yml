name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

permissions:
  contents: read

env:
  DOCKERHUB_NAMESPACE: rakib2017
  FRONTEND_IMAGE: go-frontend
  BACKEND_IMAGE: go-backend

jobs:
  Lint_frontend:
    name: Lint Frontend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ./frontend/package-lock.json

      - run: npm ci
      - run: npm run lint

  Lint_backend:
    name: Lint Backend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - uses: golangci/golangci-lint-action@v6
        with:
          working-directory: ./backend

  Test_Frontend:
    name: Test Frontend CI
    runs-on: ubuntu-latest
    needs: Lint_frontend
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ./frontend/package-lock.json

      - run: npm ci
      - run: npm run build

  Test_backend:
    name: Test Backend CI
    runs-on: ubuntu-latest
    needs: Lint_backend
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - run: go test ./...

  docker-build:
    name: Docker Build and Push
    runs-on: ubuntu-latest
    needs: [Test_Frontend, Test_backend]
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_NAMESPACE }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.DOCKERHUB_NAMESPACE }}/${{ env.FRONTEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.DOCKERHUB_NAMESPACE }}/${{ env.BACKEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-local:
    name: Pull and Run on Local Machine
    runs-on: self-hosted
    needs: docker-build
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_NAMESPACE }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Stop and clean containers
        run: |
          echo "Stopping all containers..."
          docker compose down --remove-orphans || true

          docker ps -a | grep "go.*projects" | awk '{print $1}' | xargs -r docker stop || true
          docker ps -a | grep "go.*projects" | awk '{print $1}' | xargs -r docker rm || true

          docker rm -f postgres-db nginx-lb || true

      - name: Remove old images
        run: |
          docker rmi ${{ env.DOCKERHUB_NAMESPACE }}/${{ env.FRONTEND_IMAGE }}:latest || true
          docker rmi ${{ env.DOCKERHUB_NAMESPACE }}/${{ env.BACKEND_IMAGE }}:latest || true

      - name: Pull latest images
        run: |
          docker pull ${{ env.DOCKERHUB_NAMESPACE }}/${{ env.FRONTEND_IMAGE }}:latest
          docker pull ${{ env.DOCKERHUB_NAMESPACE }}/${{ env.BACKEND_IMAGE }}:latest

      - name: Start containers
        run: |
          docker compose up -d --pull always --force-recreate --scale backend=3 --scale frontend=3

      - name: Verify containers
        run: |
          docker ps --filter "name=nginx-lb" --filter "name=backend" --filter "name=frontend" --filter "name=postgres-db"

      - name: Cleanup images
        run: |
          docker image prune -af --filter "label!=keep"
