name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

permissions:
  contents: read

env:
  DOCKERHUB_NAMESPACE: rakib2017
  FRONTEND_IMAGE: go-frontend
  BACKEND_IMAGE: go-backend

jobs:
  ## JOB 1: Lint frontend code
  Lint_frontend:
    name: Lint Frontend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ./frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

  ## JOB 2: Lint backend
  Lint_backend:
    name: Lint Backend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Lint Go
        uses: golangci/golangci-lint-action@v6
        with:
          working-directory: ./backend

  ## JOB 3: Test frontend code
  Test_Frontend:
    name: Test Frontend CI
    runs-on: ubuntu-latest
    needs: Lint_frontend
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ./frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend (CI validation)
        run: npm run build

  ## JOB 4: Test backend code
  Test_backend:
    name: Test Backend CI
    runs-on: ubuntu-latest
    needs: Lint_backend
    defaults:
      run:
        working-directory: ./backend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Test backend
        run: go test ./...

  ## JOB 5: Build and push Docker images for both services
  docker-build:
    name: Docker Build and Push
    runs-on: ubuntu-latest
    needs:
      - Test_Frontend
      - Test_backend
    if: github.event_name != 'pull_request'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_NAMESPACE }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build and push frontend image with BOTH tags
      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.DOCKERHUB_NAMESPACE }}/${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.DOCKERHUB_NAMESPACE }}/${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Build and push backend image with BOTH tags
      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.DOCKERHUB_NAMESPACE }}/${{ env.BACKEND_IMAGE }}:latest
            ${{ env.DOCKERHUB_NAMESPACE }}/${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  ## JOB 6: Deploy to local machine
  deploy-local:
    name: Pull and Run on Local Machine
    runs-on: self-hosted
    needs: docker-build
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_NAMESPACE }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Stop all containers from Docker Compose
        run: |
          echo "Stopping all containers..."
          docker compose down --remove-orphans || true
          docker rm -f postgres-db || true

      - name: Remove old images
        run: |
          echo "Removing old frontend image..."
          docker rmi ${{ env.DOCKERHUB_NAMESPACE }}/${{ env.FRONTEND_IMAGE }}:latest || true

          echo "Removing old backend image..."
          docker rmi ${{ env.DOCKERHUB_NAMESPACE }}/${{ env.BACKEND_IMAGE }}:latest || true

      - name: Pull latest images from DockerHub
        run: |
          echo "Pulling latest frontend image..."
          docker pull ${{ env.DOCKERHUB_NAMESPACE }}/${{ env.FRONTEND_IMAGE }}:latest

          echo "Pulling latest backend image..."
          docker pull ${{ env.DOCKERHUB_NAMESPACE }}/${{ env.BACKEND_IMAGE }}:latest

      - name: Start containers with Docker Compose
        run: |
          echo "Starting containers with Docker Compose..."
          docker compose up -d --pull always --force-recreate --scale backend=3 --scale frontend=3

      - name: Verify containers are running
        run: |
          echo "Verifying containers..."
          docker ps --filter "name=nginx-lb" --filter "name=backend" --filter "name=frontend" --filter "name=postgres-db"

      - name: Clean up unused images
        run: |
          echo "Cleaning up unused images..."
          docker image prune -af --filter "label!=keep"
